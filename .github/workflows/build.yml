name: Archi CI Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Archi Repository
      uses: actions/checkout@v6
      with:
        repository: archimatetool/Archi
        ref: master
        submodules: 'true'
    
    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
      
    - name: Set up Maven
      uses: stCarolas/setup-maven@v5.1
      with:
        maven-version: 3.9.12
        
    - name: Build Archi Project
      run: |
        xvfb-run mvn -V clean verify -P tests,product
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: archi-build-artifacts
        path: |
          com.archimatetool.editor.site/target/*.zip
          com.archimatetool.editor.product/target/products/Archi-*.*
        retention-days: 1
